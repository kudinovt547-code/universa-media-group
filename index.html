<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Universa Media Group — AI продукты для бизнеса</title>
<meta name="description" content="Universa Media Group — разработка AI-продуктов: сайты, приложения, чат-агенты, внутреннее ПО, Telegram/VK боты, контент-автоматизация." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="src/styles.css" />

<script>
  // Apply theme + lang before paint to avoid flash
  (function() {
    var stored = localStorage.getItem('umg.theme');
    var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.dataset.theme = theme;
    var langStored = localStorage.getItem('umg.lang');
    var lang;
    if (langStored) lang = langStored;
    else {
      var nav = (navigator.language || 'en').toLowerCase();
      lang = nav.startsWith('ru') || nav.startsWith('uk') || nav.startsWith('be') || nav.startsWith('kk') ? 'ru' : 'en';
    }
    document.documentElement.lang = lang;
    document.documentElement.dataset.lang = lang;
  })();
</script>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- App modules (order matters — globals get attached) -->
<script type="text/babel" src="src/i18n.jsx"></script>
<script type="text/babel" src="src/components.jsx"></script>
<script type="text/babel" src="src/hero.jsx"></script>
<script type="text/babel" src="src/services.jsx"></script>
<script type="text/babel" src="src/cases.jsx"></script>
<script type="text/babel" src="src/process.jsx"></script>
<script type="text/babel" src="src/quiz.jsx"></script>
<script type="text/babel" src="src/contact.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

</body>
</html>
